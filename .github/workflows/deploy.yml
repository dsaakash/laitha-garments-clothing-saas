# ──────────────────────────────────────────────────────────────
# Deploy – Trigger Render deploy on push to main
# After successful deploy, auto-creates a GitHub Release
# ──────────────────────────────────────────────────────────────
name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual deploys from GitHub UI

permissions:
  contents: write   # needed to create tags and releases

jobs:
  # ───────── CI Gate ─────────
  ci:
    name: 🔍 Pre-deploy CI Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}

  # ───────── Deploy ─────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering Render deployment..."
          DEPLOY_URL="${{ secrets.RENDER_DEPLOY_HOOK_URL }}"

          # Render deploy hooks expect a POST request
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "$DEPLOY_URL")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n 1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "Response body: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Deploy triggered successfully (HTTP $HTTP_CODE)"
          else
            echo "❌ Deploy trigger failed (HTTP $HTTP_CODE)"
            echo "Response: $BODY"
            exit 1
          fi

  # ───────── Release ─────────
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full git history for changelog

      - name: Generate version tag and changelog
        id: version
        run: |
          # Get the latest tag matching v*.*.*
          LATEST_TAG=$(git tag -l "v*.*.*" --sort=-v:refname | head -n 1)
          
          if [ -z "$LATEST_TAG" ]; then
            # If no tags exist, start at v1.0.0
            NEW_TAG="v1.0.0"
          else
            # Extract version numbers
            VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $VERSION | cut -d. -f1)
            MINOR=$(echo $VERSION | cut -d. -f2)
            PATCH=$(echo $VERSION | cut -d. -f3 | sed 's/-.*//')
            
            # Increment patch
            NEW_PATCH=$((PATCH + 1))
            NEW_TAG="v$MAJOR.$MINOR.$NEW_PATCH"
          fi
          
          RELEASE_NAME="Release ${NEW_TAG#v}"

          echo "tag=${NEW_TAG}" >> $GITHUB_OUTPUT
          echo "name=${RELEASE_NAME}" >> $GITHUB_OUTPUT
          echo "version=${NEW_TAG#v}" >> $GITHUB_OUTPUT

          # Generate changelog from last release tag (if any)
          PREV_TAG=$LATEST_TAG

          {
            echo "## 🚀 ${RELEASE_NAME}"
            echo ""
            echo "**Deployed to production** on $(date -u '+%B %d, %Y at %H:%M UTC')"
            echo ""
            echo "### 📦 Changes"
            echo ""

            if [ -z "$PREV_TAG" ]; then
              echo "🎉 **Initial release!**"
              echo ""
              git log --oneline --pretty=format:"- %s (%h)" -20
            else
              git log ${PREV_TAG}..HEAD --oneline --pretty=format:"- %s (%h)"
            fi

            echo ""
            echo ""
            echo "---"
            echo ""
            echo "| Detail | Value |"
            echo "| ------ | ----- |"
            echo "| **Version** | \`${PKG_VERSION}\` |"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Deployed by** | ${{ github.actor }} |"
          } > RELEASE_NOTES.md

          cat RELEASE_NOTES.md

      - name: Create Git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }} -m "${{ steps.version.outputs.name }}"
          git push origin ${{ steps.version.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.name }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post summary
        run: |
          echo "## 🚀 Deployment & Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Release** | \`${{ steps.version.outputs.tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deployed by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployed to Render & GitHub Release created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 [View Release](https://github.com/${{ github.repository }}/releases/tag/${{ steps.version.outputs.tag }})" >> $GITHUB_STEP_SUMMARY
