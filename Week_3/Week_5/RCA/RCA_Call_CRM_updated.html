<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCA Call CRM — Retail Control Architect</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Rajdhani:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #b79141;
  --gold-light: #e8c96a;
  --gold-dim: #7a6030;
  --dark: #0d1117;
  --dark2: #141c26;
  --dark3: #1a2535;
  --off-white: #f0e6cc;
  --text: #e8e0d0;
  --text-dim: #8a8070;
  --green: #1a7a3a;
  --green-bg: #0f3020;
  --red: #8b2020;
  --red-bg: #2a1010;
  --border: rgba(183,145,65,0.18);
  --border-dim: rgba(255,255,255,0.06);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0a0e14; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:15px; min-height:100vh; }

/* ── LAYOUT ── */
.app { display:grid; grid-template-columns:280px 1fr; min-height:100vh; }

/* ── SIDEBAR ── */
.sidebar { background:var(--dark); border-right:1px solid var(--border); display:flex; flex-direction:column; }
.sidebar-header { padding:20px 18px 16px; border-bottom:1px solid var(--border); }
.brand-name { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--gold); font-weight:600; }
.brand-sub { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; margin-top:2px; }
.sidebar-nav { padding:12px 0; flex:1; overflow-y:auto; }
.nav-section { padding:0 12px 8px; }
.nav-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; padding:8px 6px 4px; }
.nav-btn { width:100%; text-align:left; background:none; border:none; padding:9px 10px; border-radius:6px; color:var(--text-dim); font-family:'Rajdhani',sans-serif; font-size:14px; font-weight:500; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:8px; }
.nav-btn:hover { background:rgba(183,145,65,0.08); color:var(--text); }
.nav-btn.active { background:rgba(183,145,65,0.12); color:var(--gold); border-left:2px solid var(--gold); }
.nav-icon { width:16px; height:16px; opacity:0.6; }
.client-list-sidebar { padding:0 12px; overflow-y:auto; max-height:320px; }
.client-item-side { padding:9px 10px; border-radius:6px; cursor:pointer; transition:all 0.15s; border:1px solid transparent; margin-bottom:4px; }
.client-item-side:hover { background:rgba(183,145,65,0.06); border-color:var(--border); }
.client-item-side.active { background:rgba(183,145,65,0.1); border-color:var(--gold); }
.ci-name { font-size:13px; font-weight:600; color:var(--text); }
.ci-meta { font-size:11px; color:var(--text-dim); margin-top:1px; }
.ci-status { display:inline-block; width:7px; height:7px; border-radius:50%; margin-right:5px; }
.status-new { background:#b79141; }
.status-called { background:#1a7a3a; }
.status-closed { background:#4a9a6a; }
.status-lost { background:#8b2020; }
.sidebar-footer { padding:14px 18px; border-top:1px solid var(--border); }
.version { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); }

/* ── MAIN ── */
.main { background:#0a0e14; overflow-y:auto; }

/* ── TOP BAR ── */
.topbar { background:var(--dark); border-bottom:1px solid var(--border); padding:14px 28px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10; }
.page-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--off-white); font-weight:600; }
.topbar-actions { display:flex; gap:10px; }
.btn { font-family:'Rajdhani',sans-serif; font-size:13px; font-weight:600; letter-spacing:0.5px; padding:8px 18px; border-radius:5px; cursor:pointer; border:none; transition:all 0.15s; }
.btn-gold { background:var(--gold); color:var(--dark); }
.btn-gold:hover { background:var(--gold-light); }
.btn-outline { background:transparent; border:1px solid var(--border); color:var(--text-dim); }
.btn-outline:hover { border-color:var(--gold); color:var(--gold); }
.btn-sm { padding:6px 14px; font-size:12px; }
.btn-danger { background:transparent; border:1px solid var(--red); color:#e05555; }
.btn-danger:hover { background:var(--red-bg); }

/* ── PAGES ── */
.page { display:none; padding:28px; }
.page.active { display:block; }

/* ── DASHBOARD ── */
.stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:28px; }
.stat-card { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
.stat-num { font-family:'Cormorant Garamond',serif; font-size:34px; color:var(--gold); font-weight:600; }
.stat-label { font-size:12px; color:var(--text-dim); margin-top:3px; font-family:'Space Mono',monospace; letter-spacing:1px; text-transform:uppercase; }
.recent-section { background:var(--dark); border:1px solid var(--border); border-radius:8px; }
.section-header { padding:14px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
.section-title { font-size:14px; font-weight:600; color:var(--off-white); letter-spacing:0.5px; }
.clients-table { width:100%; border-collapse:collapse; }
.clients-table th { padding:10px 20px; text-align:left; font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; border-bottom:1px solid var(--border-dim); }
.clients-table td { padding:12px 20px; border-bottom:1px solid var(--border-dim); font-size:13px; }
.clients-table tr:last-child td { border-bottom:none; }
.clients-table tr:hover td { background:rgba(183,145,65,0.04); cursor:pointer; }
.status-badge { display:inline-flex; align-items:center; gap:5px; padding:3px 10px; border-radius:20px; font-size:11px; font-weight:600; }
.badge-new { background:rgba(183,145,65,0.15); color:var(--gold); }
.badge-called { background:rgba(26,122,58,0.15); color:#4aaa6a; }
.badge-closed { background:rgba(74,154,106,0.15); color:#6aee9a; }
.badge-lost { background:rgba(139,32,32,0.15); color:#e05555; }

/* ── CLIENT FORM ── */
.form-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; }
.form-full { grid-column:1/-1; }
.form-group { margin-bottom:0; }
.form-label { display:block; font-family:'Space Mono',monospace; font-size:10px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:7px; }
.form-input { width:100%; background:var(--dark2); border:1px solid var(--border); border-radius:5px; padding:10px 14px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:14px; transition:border-color 0.15s; }
.form-input:focus { outline:none; border-color:var(--gold); background:var(--dark3); }
.form-input::placeholder { color:var(--text-dim); }
select.form-input option { background:var(--dark2); }
textarea.form-input { resize:vertical; min-height:80px; }
.form-section { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:22px 24px; margin-bottom:20px; }
.form-section-title { font-size:14px; font-weight:700; color:var(--gold); letter-spacing:1px; text-transform:uppercase; margin-bottom:18px; padding-bottom:10px; border-bottom:1px solid var(--border); }

/* ── CALL SCRIPT ── */
.call-layout { display:grid; grid-template-columns:220px 1fr; gap:20px; }
.script-nav { position:sticky; top:90px; }
.script-steps { background:var(--dark); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.script-step-btn { width:100%; text-align:left; background:none; border:none; border-bottom:1px solid var(--border-dim); padding:12px 16px; cursor:pointer; transition:all 0.15s; display:flex; align-items:center; gap:10px; font-family:'Rajdhani',sans-serif; }
.script-step-btn:last-child { border-bottom:none; }
.script-step-btn:hover { background:rgba(183,145,65,0.06); }
.script-step-btn.active { background:rgba(183,145,65,0.1); border-left:2px solid var(--gold); }
.script-step-btn.done { opacity:0.5; }
.step-circle { width:26px; height:26px; border-radius:50%; background:var(--dark3); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; font-family:'Space Mono',monospace; font-size:10px; color:var(--gold-dim); flex-shrink:0; transition:all 0.15s; }
.script-step-btn.active .step-circle { background:var(--gold); color:var(--dark); border-color:var(--gold); }
.script-step-btn.done .step-circle { background:var(--green); color:white; border-color:var(--green); }
.step-info { flex:1; }
.step-name-s { font-size:12px; font-weight:600; color:var(--text); }
.step-goal-s { font-size:10px; color:var(--text-dim); margin-top:1px; }
.check-done { width:14px; height:14px; color:var(--green); }

.script-content { background:var(--dark); border:1px solid var(--border); border-radius:8px; overflow:hidden; }
.script-top { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:14px; }
.step-badge-big { background:var(--gold); color:var(--dark); font-family:'Space Mono',monospace; font-size:10px; font-weight:700; padding:4px 12px; border-radius:20px; letter-spacing:1px; }
.script-headline { font-size:16px; font-weight:700; color:var(--off-white); }
.script-goal-tag { margin-left:auto; font-size:11px; color:var(--gold-dim); background:rgba(183,145,65,0.1); padding:3px 10px; border-radius:20px; }
.script-body { padding:20px; }

.script-block { margin-bottom:20px; }
.script-block-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold); letter-spacing:2px; text-transform:uppercase; margin-bottom:10px; }
.script-line-card { background:var(--dark3); border-left:3px solid var(--gold); border-radius:0 6px 6px 0; padding:11px 15px; margin-bottom:8px; font-size:14px; color:var(--text); line-height:1.5; }
.note-card { background:rgba(183,145,65,0.06); border:1px solid rgba(183,145,65,0.2); border-radius:6px; padding:10px 14px; margin-bottom:8px; font-size:12px; color:var(--gold-dim); font-style:italic; }
.note-card::before { content:"NOTE: "; font-weight:700; color:var(--gold); font-style:normal; }
.q-item { display:flex; gap:10px; padding:8px 0; border-bottom:1px solid var(--border-dim); font-size:13px; color:var(--text); }
.q-item:last-child { border-bottom:none; }
.q-num { font-weight:700; color:var(--gold); flex-shrink:0; width:24px; }
.notes-area { margin-top:16px; }
.notes-label { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:8px; }
.notes-input { width:100%; background:var(--dark2); border:1px solid var(--border); border-radius:6px; padding:12px 14px; color:var(--text); font-family:'Rajdhani',sans-serif; font-size:14px; resize:vertical; min-height:90px; }
.notes-input:focus { outline:none; border-color:var(--gold); }
.script-footer { padding:16px 20px; border-top:1px solid var(--border); display:flex; gap:10px; align-items:center; }
.progress-bar-wrap { flex:1; background:var(--dark3); border-radius:10px; height:6px; }
.progress-bar-fill { height:6px; border-radius:10px; background:var(--gold); transition:width 0.3s; }

/* ── CLIENT DETAIL ── */
.client-header { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:22px 24px; margin-bottom:20px; display:flex; align-items:center; gap:20px; }
.client-avatar { width:52px; height:52px; border-radius:50%; background:rgba(183,145,65,0.15); border:1px solid var(--gold); display:flex; align-items:center; justify-content:center; font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--gold); flex-shrink:0; }
.client-info { flex:1; }
.client-name-big { font-family:'Cormorant Garamond',serif; font-size:24px; color:var(--off-white); font-weight:600; }
.client-meta-row { display:flex; gap:20px; margin-top:4px; flex-wrap:wrap; }
.client-meta-item { font-size:12px; color:var(--text-dim); display:flex; align-items:center; gap:5px; }
.client-actions-top { display:flex; gap:10px; margin-left:auto; }
.detail-grid { display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:20px; }
.detail-card { background:var(--dark); border:1px solid var(--border); border-radius:8px; padding:18px 20px; }
.detail-card-title { font-family:'Space Mono',monospace; font-size:9px; color:var(--gold-dim); letter-spacing:2px; text-transform:uppercase; margin-bottom:14px; }
.detail-row { display:flex; justify-content:space-between; padding:7px 0; border-bottom:1px solid var(--border-dim); font-size:13px; }
.detail-row:last-child { border-bottom:none; }
.detail-key { color:var(--text-dim); }
.detail-val { color:var(--text); font-weight:500; }

/* ── OBJECTIONS ── */
.obj-pair { margin-bottom:10px; border-radius:6px; overflow:hidden; }
.obj-q-line { background:var(--red-bg); border:1px solid rgba(139,32,32,0.4); border-bottom:none; padding:10px 14px; font-size:12px; color:#e07070; }
.obj-a-line { background:var(--green-bg); border:1px solid rgba(26,122,58,0.4); padding:10px 14px; font-size:12px; color:#6aaa8a; }
.obj-tag-s { font-weight:700; font-size:10px; margin-right:6px; letter-spacing:1px; }

/* ── MODAL ── */
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:100; align-items:center; justify-content:center; }
.modal-overlay.open { display:flex; }
.modal { background:var(--dark); border:1px solid var(--border); border-radius:10px; width:680px; max-width:95vw; max-height:90vh; overflow-y:auto; }
.modal-header { padding:18px 24px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; background:var(--dark); z-index:1; }
.modal-title { font-family:'Cormorant Garamond',serif; font-size:20px; color:var(--off-white); font-weight:600; }
.modal-close { background:none; border:none; color:var(--text-dim); font-size:22px; cursor:pointer; line-height:1; }
.modal-close:hover { color:var(--text); }
.modal-body { padding:24px; }
.modal-footer { padding:16px 24px; border-top:1px solid var(--border); display:flex; gap:10px; justify-content:flex-end; }

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:60px 20px; color:var(--text-dim); }
.empty-icon { font-size:40px; margin-bottom:14px; opacity:0.3; }
.empty-title { font-size:16px; color:var(--text); margin-bottom:6px; }
.empty-sub { font-size:13px; }

/* ── TOAST ── */
.toast { position:fixed; bottom:24px; right:24px; background:var(--dark3); border:1px solid var(--gold); border-radius:6px; padding:12px 18px; font-size:13px; color:var(--gold); z-index:200; opacity:0; transform:translateY(10px); transition:all 0.25s; }
.toast.show { opacity:1; transform:translateY(0); }

/* ── SCROLLBAR ── */
::-webkit-scrollbar { width:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
</style>
</head>
<body>

<div class="app">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-header">
      <div class="brand-name">Retail Control</div>
      <div class="brand-sub">Architect · CRM</div>
    </div>
    <div class="sidebar-nav">
      <div class="nav-section">
        <div class="nav-label">Menu</div>
        <button class="nav-btn active" onclick="showPage('dashboard')">
          <span>◈</span> Dashboard
        </button>
        <button class="nav-btn" onclick="showPage('new-client')">
          <span>+</span> New Client
        </button>
        <button class="nav-btn" onclick="showPage('all-clients')">
          <span>≡</span> All Clients
        </button>
      </div>
      <div class="nav-section">
        <div class="nav-label">Recent Clients</div>
        <div class="client-list-sidebar" id="sidebarClients"></div>
      </div>
    </div>
    <div class="sidebar-footer">
      <div class="version">Aakash Savant · RCA v1.0</div>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">
    <div class="topbar">
      <div class="page-title" id="pageTitle">Dashboard</div>
      <div class="topbar-actions">
        <button class="btn btn-outline btn-sm" onclick="exportData()">Export</button>
        <button class="btn btn-gold btn-sm" onclick="showPage('new-client')">+ New Client</button>
      </div>
    </div>

    <!-- DASHBOARD PAGE -->
    <div class="page active" id="page-dashboard">
      <div class="stats-grid" id="statsGrid"></div>
      <div class="recent-section">
        <div class="section-header">
          <div class="section-title">All Clients</div>
          <div style="display:flex;gap:8px;">
            <select class="form-input" style="padding:5px 10px;font-size:12px;width:auto;" onchange="filterClients(this.value)">
              <option value="all">All Status</option>
              <option value="new">New</option>
              <option value="called">Called</option>
              <option value="closed">Closed</option>
              <option value="lost">Lost</option>
            </select>
          </div>
        </div>
        <table class="clients-table" id="clientsTable">
          <thead>
            <tr>
              <th>Name</th><th>City</th><th>Store Type</th><th>Call Date</th><th>Status</th><th>Action</th>
            </tr>
          </thead>
          <tbody id="clientsTableBody"></tbody>
        </table>
      </div>
    </div>

    <!-- NEW CLIENT PAGE -->
    <div class="page" id="page-new-client">
      <div class="form-section">
        <div class="form-section-title">Client Profile — Post Booking</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Full Name *</label>
            <input class="form-input" id="f-name" placeholder="Ramesh Kumar Sharma" type="text">
          </div>
          <div class="form-group">
            <label class="form-label">Phone Number *</label>
            <input class="form-input" id="f-phone" placeholder="+91 98765 43210" type="tel">
          </div>
          <div class="form-group">
            <label class="form-label">City</label>
            <input class="form-input" id="f-city" placeholder="Mysore, Karnataka" type="text">
          </div>
          <div class="form-group">
            <label class="form-label">Store Name</label>
            <input class="form-input" id="f-store" placeholder="Sharma Fashion House" type="text">
          </div>
          <div class="form-group">
            <label class="form-label">Store Type</label>
            <select class="form-input" id="f-type">
              <option value="">Select...</option>
              <option>Clothing — Mens</option>
              <option>Clothing — Womens</option>
              <option>Clothing — Kids</option>
              <option>Clothing — Family</option>
              <option>Ethnic Wear</option>
              <option>Western Wear</option>
              <option>Footwear</option>
              <option>Accessories</option>
              <option>Multi-category</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Years In Business</label>
            <input class="form-input" id="f-years" placeholder="12" type="number">
          </div>
          <div class="form-group">
            <label class="form-label">Call Date & Time</label>
            <input class="form-input" id="f-calldate" type="datetime-local">
          </div>
          <div class="form-group">
            <label class="form-label">Lead Source</label>
            <select class="form-input" id="f-source">
              <option value="">Select...</option>
              <option>Instagram Reel</option>
              <option>YouTube</option>
              <option>WhatsApp</option>
              <option>Referral</option>
              <option>Free Training</option>
              <option>Direct DM</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group form-full">
            <label class="form-label">Initial Notes (What they said while booking)</label>
            <textarea class="form-input" id="f-notes" placeholder="What problem did they mention? What made them book? Any specific pain point they shared..."></textarea>
          </div>
        </div>
      </div>

      <div class="form-section">
        <div class="form-section-title">Pre-Call Research</div>
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label">Estimated Annual Revenue</label>
            <select class="form-input" id="f-revenue">
              <option value="">Unknown</option>
              <option>Under ₹25 Lakh</option>
              <option>₹25-50 Lakh</option>
              <option>₹50L-1 Crore</option>
              <option>1-2 Crore</option>
              <option>Above 2 Crore</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Number of Staff</label>
            <input class="form-input" id="f-staff" placeholder="3-5" type="text">
          </div>
          <div class="form-group">
            <label class="form-label">Billing Software Used</label>
            <input class="form-input" id="f-software" placeholder="Busy, Tally, Vyapar, None..." type="text">
          </div>
          <div class="form-group">
            <label class="form-label">WhatsApp / Instagram Handle</label>
            <input class="form-input" id="f-social" placeholder="@storename" type="text">
          </div>
        </div>
      </div>

      <div style="display:flex;gap:12px;">
        <button class="btn btn-gold" onclick="saveClient()">Save Client & Open Call Script</button>
        <button class="btn btn-outline" onclick="clearForm()">Clear</button>
      </div>
    </div>

    <!-- ALL CLIENTS PAGE -->
    <div class="page" id="page-all-clients">
      <div class="recent-section">
        <div class="section-header">
          <div class="section-title">All Clients</div>
        </div>
        <table class="clients-table">
          <thead><tr><th>Name</th><th>City</th><th>Store</th><th>Call Date</th><th>Status</th><th></th></tr></thead>
          <tbody id="allClientsBody"></tbody>
        </table>
      </div>
    </div>

    <!-- CLIENT DETAIL PAGE -->
    <div class="page" id="page-client-detail">
      <div id="clientDetailContent"></div>
    </div>

    <!-- CALL SCRIPT PAGE -->
    <div class="page" id="page-call-script">
      <div id="callScriptContent"></div>
    </div>

<div class="modal-overlay" id="modal">

<div class="toast" id="toast"></div>

<script>
// ── DATA STORE ──────────────────────────────────────────────
let clients = JSON.parse(localStorage.getItem('rca_clients') || '[]');

function save() {
  localStorage.setItem('rca_clients', JSON.stringify(clients));
}

function getInitials(name) {
  return name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
}

function fmtDate(d) {
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
}

function fmtDateTime(d) {
  if(!d) return '—';
  const dt = new Date(d);
  return dt.toLocaleDateString('en-IN',{day:'2-digit',month:'short'}) + ' ' + dt.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}

function statusBadge(s) {
  const map = {new:'badge-new',called:'badge-called',closed:'badge-closed',lost:'badge-lost'};
  const labels = {new:'New',called:'Called',closed:'Closed ✓',lost:'Lost'};
  return `<span class="status-badge ${map[s]||'badge-new'}">${labels[s]||s}</span>`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}

// ── NAVIGATION ──────────────────────────────────────────────
function showPage(page, data) {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const titles = {dashboard:'Dashboard','new-client':'New Client','all-clients':'All Clients','client-detail':'Client Profile','call-script':'Call Script'};
  document.getElementById('pageTitle').textContent = titles[page]||'';
  if(page==='dashboard') { renderDashboard(); }
  if(page==='all-clients') { renderAllClients(); }
  if(page==='client-detail' && data) renderClientDetail(data);
  if(page==='call-script' && data) renderCallScript(data);
  renderSidebar();
}

// ── SIDEBAR ─────────────────────────────────────────────────
function renderSidebar() {
  const el = document.getElementById('sidebarClients');
  const recent = [...clients].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,8);
  if(!recent.length){el.innerHTML='<div style="padding:8px 6px;font-size:12px;color:var(--text-dim);">No clients yet</div>';return;}
  el.innerHTML = recent.map(c=>`
    <div class="client-item-side" onclick="showPage('client-detail','${c.id}')">
      <div class="ci-name"><span class="ci-status status-${c.status||'new'}"></span>${c.name}</div>
      <div class="ci-meta">${c.city||'—'} · ${c.storeType||'—'}</div>
    </div>`).join('');
}

// ── DASHBOARD ───────────────────────────────────────────────
function renderDashboard() {
  const total = clients.length;
  const called = clients.filter(c=>c.status==='called').length;
  const closed = clients.filter(c=>c.status==='closed').length;
  const rate = total ? Math.round(closed/total*100) : 0;
  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${total}</div><div class="stat-label">Total Clients</div></div>
    <div class="stat-card"><div class="stat-num">${called}</div><div class="stat-label">Calls Done</div></div>
    <div class="stat-card"><div class="stat-num">${closed}</div><div class="stat-label">Closed</div></div>
    <div class="stat-card"><div class="stat-num">${rate}%</div><div class="stat-label">Close Rate</div></div>`;
  renderClientsTable('clientsTableBody', clients);
}

function filterClients(status) {
  const filtered = status==='all' ? clients : clients.filter(c=>c.status===status);
  renderClientsTable('clientsTableBody', filtered);
}

function renderClientsTable(tbodyId, data) {
  const tbody = document.getElementById(tbodyId);
  if(!data.length){tbody.innerHTML='<tr><td colspan="6" style="text-align:center;padding:40px;color:var(--text-dim);">No clients found. Click "+ New Client" to add one.</td></tr>';return;}
  tbody.innerHTML = [...data].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).map(c=>`
    <tr onclick="showPage('client-detail','${c.id}')">
      <td style="font-weight:600;color:var(--off-white);">${c.name}</td>
      <td>${c.city||'—'}</td>
      <td>${c.storeType||'—'}</td>
      <td>${fmtDateTime(c.callDate)}</td>
      <td>${statusBadge(c.status||'new')}</td>
      <td onclick="event.stopPropagation()">
        <button class="btn btn-outline btn-sm" onclick="showPage('call-script','${c.id}')">Open Script</button>
      </td>
    </tr>`).join('');
}

function renderAllClients() {
  renderClientsTable('allClientsBody', clients);
}

// ── NEW CLIENT ───────────────────────────────────────────────
function saveClient() {
  const name = document.getElementById('f-name').value.trim();
  if(!name){showToast('Name is required!');return;}
  const client = {
    id: 'c_'+Date.now(),
    name,
    phone: document.getElementById('f-phone').value,
    city: document.getElementById('f-city').value,
    storeName: document.getElementById('f-store').value,
    storeType: document.getElementById('f-type').value,
    years: document.getElementById('f-years').value,
    callDate: document.getElementById('f-calldate').value,
    source: document.getElementById('f-source').value,
    notes: document.getElementById('f-notes').value,
    revenue: document.getElementById('f-revenue').value,
    staff: document.getElementById('f-staff').value,
    software: document.getElementById('f-software').value,
    social: document.getElementById('f-social').value,
    status: 'new',
    createdAt: new Date().toISOString(),
    scriptNotes: {},
    scriptDone: [],
    currentStep: 0,
    outcome: '',
    followUpDate: '',
    dealValue: ''
  };
  clients.push(client);
  save();
  clearForm();
  showToast('Client saved!');
  showPage('call-script', client.id);
}

function clearForm() {
  ['f-name','f-phone','f-city','f-store','f-years','f-notes','f-staff','f-software','f-social'].forEach(id=>document.getElementById(id).value='');
  ['f-type','f-source','f-revenue'].forEach(id=>document.getElementById(id).selectedIndex=0);

}

function saveStatus(id) {
  const c = clients.find(x=>x.id===id);

  clients = clients.filter(c=>c.id!==id);

}

function renderCallScript(id) {
  const c = clients.find(x=>x.id===id);
  if(!c){document.getElementById('callScriptContent').innerHTML='<div class="empty-state"><div class="empty-title">Client not found</div></div>';return;}
  const currentStep = c.currentStep||0;

  const stepsNav = SCRIPT_STEPS.map((s,i)=>{
    const done = (c.scriptDone||[]).includes(i);
    const active = i===currentStep;
    return `<button class="script-step-btn ${active?'active':''} ${done?'done':''}" onclick="goScriptStep('${id}',${i})">
      <div class="step-circle">${done?'✓':s.num}</div>
      <div class="step-info">
        <div class="step-name-s">${s.name}</div>
        <div class="step-goal-s">${s.goal}</div>
      </div>
    </button>`;
  }).join('');

  const step = SCRIPT_STEPS[currentStep];
  const name = c.name.split(' ')[0];
  const blocks = step.blocks.map(b=>{
    if(b.type==='label') return `<div class="script-block-label">${b.text}</div>`;
    if(b.type==='script'){
      const text = typeof b.text==='function'?b.text(name):b.text;
      return `<div class="script-line-card">${text}</div>`;
    }
    if(b.type==='note') return `<div class="note-card">${b.text}</div>`;
    if(b.type==='q') return `<div class="q-item"><span class="q-num">Q${b.num}</span><span>${b.text}</span></div>`;
    return '';
  }).join('');

  const notes = (c.scriptNotes||{})[currentStep]||'';
  const progress = ((c.scriptDone||[]).length/7*100).toFixed(0);

  document.getElementById('callScriptContent').innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:20px;">
      <div class="client-avatar" style="width:40px;height:40px;font-size:16px;">${getInitials(c.name)}</div>
      <div>
        <div style="font-size:17px;font-weight:700;color:var(--off-white);">${c.name}</div>
        <div style="font-size:12px;color:var(--text-dim);">${c.storeName||c.storeType||'—'} · ${c.city||'—'}</div>
      </div>
      <div style="margin-left:auto;display:flex;gap:10px;align-items:center;">
        ${statusBadge(c.status||'new')}
        <button class="btn btn-outline btn-sm" onclick="showPage('client-detail','${id}')">Profile</button>
        <select class="form-input" style="padding:5px 10px;font-size:12px;width:auto;" onchange="updateField('${id}','status',this.value);renderCallScript('${id}')">
          <option value="new" ${c.status==='new'?'selected':''}>New</option>
          <option value="called" ${c.status==='called'?'selected':''}>Called</option>
          <option value="closed" ${c.status==='closed'?'selected':''}>Closed</option>
          <option value="lost" ${c.status==='lost'?'selected':''}>Lost</option>
        </select>
      </div>
    </div>

    <div class="call-layout">
      <div class="script-nav">
        <div class="script-steps">${stepsNav}</div>
        <div style="margin-top:14px;background:var(--dark);border:1px solid var(--border);border-radius:8px;padding:14px;">
          <div style="font-family:'Space Mono',monospace;font-size:9px;color:var(--gold-dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px;">Call Progress</div>
          <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
          <div style="font-size:12px;color:var(--text-dim);margin-top:6px;">${(c.scriptDone||[]).length} of 7 steps done</div>
        </div>
      </div>

      <div>
        <div class="script-content">
          <div class="script-top">
            <div class="step-badge-big">STEP ${step.num}</div>
            <div class="script-headline">${step.name}</div>
            <div class="script-goal-tag">${step.goal}</div>
          </div>
          <div class="script-body">
            ${blocks}
            <div class="notes-area">
              <div class="notes-label">Your Notes For This Step</div>
              <textarea class="notes-input" id="stepNotes_${currentStep}" placeholder="Write what the client said, their pain points, their answers...">${notes}</textarea>
            </div>
          </div>
          <div class="script-footer">
            ${currentStep>0?`<button class="btn btn-outline btn-sm" onclick="goScriptStep('${id}',${currentStep-1})">← Prev</button>`:''}
            <button class="btn btn-outline btn-sm" onclick="markStepDone('${id}',${currentStep})" style="color:var(--green);border-color:var(--green);">Mark Done ✓</button>
            ${currentStep<6?`<button class="btn btn-gold btn-sm" onclick="saveStepAndNext('${id}',${currentStep})">Save & Next Step →</button>`:`<button class="btn btn-gold btn-sm" onclick="finishCall('${id}')">Finish Call</button>`}
          </div>
        </div>

        <div style="background:var(--dark);border:1px solid var(--border);border-radius:8px;margin-top:18px;overflow:hidden;">
          <div class="section-header"><div class="section-title">Objection Handling — Keep This Ready</div></div>
          <div style="padding:16px 18px;">
            ${OBJECTIONS.map(o=>`
              <div class="obj-pair">
                <div class="obj-q-line"><span class="obj-tag-s">OBJECTION</span>${o.q}</div>
                <div class="obj-a-line"><span class="obj-tag-s">HANDLE</span>${o.a}</div>
              </div>`).join('')}
          </div>
        </div>
      </div>
    </div>`;
}

function goScriptStep(id, step) {
  const c = clients.find(x=>x.id===id);
  saveCurrentStepNotes(c);
  c.currentStep = step;
  save();
  renderCallScript(id);
}

function saveCurrentStepNotes(c) {
  const step = c.currentStep||0;
  const el = document.getElementById('stepNotes_'+step);
  if(el){
    if(!c.scriptNotes) c.scriptNotes={};
    c.scriptNotes[step]=el.value;
    save();
  }
}

function markStepDone(id, step) {
  const c = clients.find(x=>x.id===id);
  saveCurrentStepNotes(c);
  if(!c.scriptDone) c.scriptDone=[];
  if(!c.scriptDone.includes(step)) c.scriptDone.push(step);
  if(c.status==='new') c.status='called';
  save();
  showToast('Step '+Number(step+1)+' marked done!');
  renderCallScript(id);
}

function saveStepAndNext(id, step) {
  const c = clients.find(x=>x.id===id);
  saveCurrentStepNotes(c);
  if(!c.scriptDone) c.scriptDone=[];
  if(!c.scriptDone.includes(step)) c.scriptDone.push(step);
  if(c.status==='new') c.status='called';
  c.currentStep = Math.min(step+1, 6);
  save();
  renderCallScript(id);
}

function finishCall(id) {
  const c = clients.find(x=>x.id===id);
  saveCurrentStepNotes(c);
  document.getElementById('modalTitle').textContent = 'Finish Call — '+c.name;
  document.getElementById('modalBody').innerHTML = `
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Call Outcome</label>
        <select class="form-input" id="fin-outcome">
          <option>Interested — Follow Up</option>
          <option>Closed — Paid</option>
          <option>Thinking — 2 Days</option>
          <option>Not Interested</option>
          <option>No Show</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Deal Value (₹)</label>
        <input class="form-input" id="fin-deal" placeholder="25000" type="number">
      </div>
      <div class="form-group">
        <label class="form-label">Follow Up Date</label>
        <input class="form-input" type="date" id="fin-followup">
      </div>
      <div class="form-group">
        <label class="form-label">Update Status</label>
        <select class="form-input" id="fin-status">
          <option value="called">Called</option>
          <option value="closed">Closed</option>
          <option value="lost">Lost</option>
        </select>
      </div>
      <div class="form-group form-full">
        <label class="form-label">Final Notes</label>
        <textarea class="form-input" id="fin-notes" placeholder="Overall summary of this call..."></textarea>
      </div>
    </div>`;
  document.getElementById('modalFooter').innerHTML = `
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-gold" onclick="saveFinishCall('${id}')">Save & Close Call</button>`;
  openModal();
}

function saveFinishCall(id) {
  const c = clients.find(x=>x.id===id);
  c.outcome = document.getElementById('fin-outcome').value;
  c.dealValue = document.getElementById('fin-deal').value;
  c.followUpDate = document.getElementById('fin-followup').value;
  c.status = document.getElementById('fin-status').value;
  const finalNote = document.getElementById('fin-notes').value;
  if(finalNote) c.notes = (c.notes?c.notes+'\n\n---CALL NOTES---\n':'')+finalNote;
  if(!c.scriptDone) c.scriptDone=[];
  [0,1,2,3,4,5,6].forEach(i=>{if(!c.scriptDone.includes(i))c.scriptDone.push(i);});
  save();
  closeModal();
  showToast('Call completed! Client updated.');
  showPage('client-detail', id);
}

// ── MODAL ────────────────────────────────────────────────────
function openModal(){ document.getElementById('modal').classList.add('open'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', function(e){ if(e.target===this) closeModal(); });

// ── EXPORT ──────────────────────────────────────────────────
function exportData() {
  const data = JSON.stringify(clients, null, 2);
  const blob = new Blob([data], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'RCA_Clients_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();
  showToast('Data exported!');
}

// ── INIT ─────────────────────────────────────────────────────
renderDashboard();
renderSidebar();
</script>
</body>
</html>
