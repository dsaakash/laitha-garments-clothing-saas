# ──────────────────────────────────────────────────────────────
# Deploy – Trigger Render deploy on push to main
# Uses Render Deploy Hook to kick off a new deploy
# ──────────────────────────────────────────────────────────────
name: Deploy to Render

on:
  push:
    branches: [main]
  workflow_dispatch:   # allow manual deploys from GitHub UI

jobs:
  # ───────── CI Gate ─────────
  ci:
    name: 🔍 Pre-deploy CI Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_MODEL: ${{ secrets.GROQ_MODEL }}

  # ───────── Deploy ─────────
  deploy:
    name: 🚀 Deploy to Render
    runs-on: ubuntu-latest
    needs: ci
    environment: production

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          echo "🚀 Triggering Render deployment..."
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.RENDER_DEPLOY_HOOK_URL }}")
          
          if [ "$RESPONSE" -eq 200 ] || [ "$RESPONSE" -eq 201 ]; then
            echo "✅ Deploy triggered successfully (HTTP $RESPONSE)"
          else
            echo "❌ Deploy trigger failed (HTTP $RESPONSE)"
            exit 1
          fi

      - name: Post-deploy summary
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Detail | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| ------ | ----- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | \`${{ github.ref_name }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Triggered by** | ${{ github.actor }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Timestamp** | $(date -u '+%Y-%m-%d %H:%M:%S UTC') |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🔗 Check your [Render Dashboard](https://dashboard.render.com) for deploy progress." >> $GITHUB_STEP_SUMMARY
